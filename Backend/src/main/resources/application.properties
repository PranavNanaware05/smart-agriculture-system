spring.application.name=smart-agriculture-backend

# Server
server.port=8080

# MySQL — database name: smart_agriculture
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/smart_agriculture?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8}
spring.datasource.username=root
spring.datasource.password=pranav@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT (Base64-encoded key, >= 256 bits when decoded)
app.security.jwt.secret=${JWT_SECRET:bXktcGVyZmVjdGx5LXNhZmUtMzItYnl0ZS1rZXkhISE=}
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Registration: only FARMER role allowed on public /register
app.security.allow-only-farmer-self-registration=true

# Open-Meteo (no API key). Override base if needed.
app.weather.open-meteo-base-url=${WEATHER_OPEN_METEO_BASE:https://api.open-meteo.com/v1}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# Springdoc / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
